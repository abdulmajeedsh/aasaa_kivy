name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            build-essential libssl-dev libffi-dev \
            libsqlite3-dev sqlite3 \
            autoconf automake libtool \
            python3-dev python3-pip \
            ccache

      - name: Install Android SDK packages
        run: |
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          # Write license hashes directly — avoids all interactive prompts
          mkdir -p $ANDROID_HOME/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n" \
            > $ANDROID_HOME/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" \
            > $ANDROID_HOME/licenses/android-sdk-preview-license
          printf "33b6937b7c5b4c52ee5ba8ea9a3e5e966e8f5ba4\n" \
            > $ANDROID_HOME/licenses/android-sdk-arm-dbt-license

          sdkmanager --sdk_root=$ANDROID_HOME \
            "build-tools;33.0.2" \
            "platforms;android-33" \
            "ndk;25.1.8937393"

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          # cython<3.0 required — pyjnius doesn't compile with Cython 3.x
          pip install buildozer==1.5.0 "cython<3.0"

      - name: Pre-populate Buildozer SDK/NDK cache
        run: |
          # Buildozer ignores android.sdk_path and always uses ~/.buildozer/.
          # We symlink system SDK components there so it never calls sdkmanager itself.
          BSDK=$HOME/.buildozer/android/platform/android-sdk
          BPLATFORM=$HOME/.buildozer/android/platform

          mkdir -p $BSDK

          for dir in platforms platform-tools licenses cmdline-tools; do
            [ -d "$ANDROID_HOME/$dir" ] && ln -sfn $ANDROID_HOME/$dir $BSDK/$dir
          done

          # Only expose the specific build-tools version we need.
          # Symlinking the whole build-tools dir would expose 37.0.0-rc2 (pre-installed
          # on the runner), which p4a picks as the max version. AGP 8.x can't parse
          # the RC suffix and throws "Value is null" in the generated build.gradle.
          mkdir -p $BSDK/build-tools
          ln -sfn $ANDROID_HOME/build-tools/33.0.2 $BSDK/build-tools/33.0.2

          # Buildozer looks for sdkmanager at the old tools/bin/ path
          mkdir -p $BSDK/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $BSDK/tools/bin/sdkmanager
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager  $BSDK/tools/bin/avdmanager

          # NDK — must match android.ndk = 25b in buildozer.spec
          ln -sfn $ANDROID_HOME/ndk/25.1.8937393 $BPLATFORM/android-ndk-r25b

      - name: Build APK (debug)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          # Tee full output to a file so we can upload it even when truncated
          buildozer android debug 2>&1 | tee /tmp/buildozer-full.log
          exit ${PIPESTATUS[0]}

      - name: Re-run Gradle directly to show real error
        if: failure()
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
        run: |
          GRADLEW=$(find .buildozer -name "gradlew" 2>/dev/null | head -1)
          if [ -n "$GRADLEW" ]; then
            chmod +x "$GRADLEW"
            cd "$(dirname $GRADLEW)"
            echo "=== Running gradlew with --stacktrace ==="
            ./gradlew assembleDebug --stacktrace 2>&1 | tail -300
          else
            echo "gradlew not found — build failed before Gradle stage"
          fi

      - name: Upload full build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-full-log
          path: /tmp/buildozer-full.log
          retention-days: 3

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aasaa-booking-debug-apk
          path: bin/*.apk
          retention-days: 30
